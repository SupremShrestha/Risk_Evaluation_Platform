services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bipad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow_postgres:
    image: postgres:16
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow_init
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      - airflow_postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Suprem --lastname Shrestha --role Admin --email admin@example.com"
    volumes:
      - ../ingestion:/opt/airflow/ingestion
      - ../ml:/opt/airflow/ml
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow_webserver
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "requests psycopg2-binary python-dotenv great-expectations==0.18.22 pandas scikit-learn mlflow joblib sqlalchemy"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: postgres
      DB_PORT: "5432"
    ports:
      - "8080:8080"
    volumes:
      - ../ingestion:/opt/airflow/ingestion
      - ../ml:/opt/airflow/ml
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow_scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "requests psycopg2-binary python-dotenv great-expectations==0.18.22 pandas scikit-learn mlflow joblib sqlalchemy"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - ../ingestion:/opt/airflow/ingestion
      - ../ml:/opt/airflow/ml
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: scheduler

volumes:
  postgres_data:
  airflow_postgres_data: